name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  MODELSCOPE_VERSION: 1.35.4
  ALIYUN_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
  ALIYUN_REGISTRY_NAMESPACE: ${{ vars.ALIYUN_REGISTRY_NAMESPACE }}
  ALIYUN_IMAGE_NAME: ${{ vars.ALIYUN_IMAGE_NAME }}
  ALIYUN_REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
  ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelrun-frontend
          path: dist
          if-no-files-found: error

  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.mod
            backend/go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build Linux binary
        run: go build -trimpath -ldflags="-s -w" -o bin/modelrun ./cmd/modelrun

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelrun-backend-linux-amd64
          path: backend/bin/modelrun
          if-no-files-found: error

  image:
    name: Container Image
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun Container Registry
        if: github.event_name != 'pull_request' && env.ALIYUN_REGISTRY != '' && env.ALIYUN_REGISTRY_NAMESPACE != '' && env.ALIYUN_REGISTRY_USERNAME != '' && env.ALIYUN_REGISTRY_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ env.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ env.ALIYUN_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Prepare publish tags
        id: publish-tags
        shell: bash
        env:
          GHCR_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          ALIYUN_REGISTRY: ${{ env.ALIYUN_REGISTRY }}
          ALIYUN_REGISTRY_NAMESPACE: ${{ env.ALIYUN_REGISTRY_NAMESPACE }}
          ALIYUN_IMAGE_NAME: ${{ env.ALIYUN_IMAGE_NAME }}
          ALIYUN_REGISTRY_USERNAME: ${{ env.ALIYUN_REGISTRY_USERNAME }}
          ALIYUN_REGISTRY_PASSWORD: ${{ env.ALIYUN_REGISTRY_PASSWORD }}
        run: |
          tags='${{ steps.meta.outputs.tags }}'
          combined_tags="$tags"

          if [[ -n "$ALIYUN_REGISTRY" && -n "$ALIYUN_REGISTRY_NAMESPACE" && -n "$ALIYUN_REGISTRY_USERNAME" && -n "$ALIYUN_REGISTRY_PASSWORD" ]]; then
            aliyun_image_name="${ALIYUN_IMAGE_NAME:-${GITHUB_REPOSITORY##*/}}"
            aliyun_image="${ALIYUN_REGISTRY}/${ALIYUN_REGISTRY_NAMESPACE}/${aliyun_image_name}"
            while IFS= read -r tag; do
              [[ -z "$tag" ]] && continue
              suffix="${tag#${GHCR_IMAGE}:}"
              combined_tags+=$'\n'"${aliyun_image}:${suffix}"
            done <<< "$tags"
          else
            echo "::notice::Aliyun registry publish skipped because ALIYUN_REGISTRY / ALIYUN_REGISTRY_NAMESPACE / ALIYUN_REGISTRY_USERNAME / ALIYUN_REGISTRY_PASSWORD are not fully configured."
          fi

          {
            echo 'value<<EOF'
            echo "$combined_tags"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.publish-tags.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODELSCOPE_VERSION=${{ env.MODELSCOPE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
