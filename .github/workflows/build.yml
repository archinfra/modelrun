name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  MODELSCOPE_VERSION: 1.35.4

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelrun-frontend
          path: dist
          if-no-files-found: error

  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.mod
            backend/go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build Linux binary
        run: go build -trimpath -ldflags="-s -w" -o bin/modelrun ./cmd/modelrun

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelrun-backend-linux-amd64
          path: backend/bin/modelrun
          if-no-files-found: error

  image:
    name: Container Image
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve publish registries
        id: registry-config
        shell: bash
        env:
          ALIYUN_REGISTRY_VAR: ${{ vars.ALIYUN_REGISTRY }}
          ALIYUN_REGISTRY_NAMESPACE_VAR: ${{ vars.ALIYUN_REGISTRY_NAMESPACE }}
          ALIYUN_IMAGE_NAME_VAR: ${{ vars.ALIYUN_IMAGE_NAME }}
          ALIYUN_REGISTRY_SECRET: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_REGISTRY_NAMESPACE_SECRET: ${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}
          ALIYUN_IMAGE_NAME_SECRET: ${{ secrets.ALIYUN_IMAGE_NAME }}
          ALIYUN_REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
        run: |
          aliyun_registry="${ALIYUN_REGISTRY_VAR:-$ALIYUN_REGISTRY_SECRET}"
          aliyun_namespace="${ALIYUN_REGISTRY_NAMESPACE_VAR:-$ALIYUN_REGISTRY_NAMESPACE_SECRET}"
          aliyun_image_name="${ALIYUN_IMAGE_NAME_VAR:-$ALIYUN_IMAGE_NAME_SECRET}"
          if [[ -z "$aliyun_image_name" ]]; then
            aliyun_image_name="${GITHUB_REPOSITORY##*/}"
          fi

          missing=()
          [[ -n "$aliyun_registry" ]] || missing+=("ALIYUN_REGISTRY")
          [[ -n "$aliyun_namespace" ]] || missing+=("ALIYUN_REGISTRY_NAMESPACE")
          [[ -n "$ALIYUN_REGISTRY_USERNAME" ]] || missing+=("ALIYUN_REGISTRY_USERNAME")
          [[ -n "$ALIYUN_REGISTRY_PASSWORD" ]] || missing+=("ALIYUN_REGISTRY_PASSWORD")

          aliyun_enabled=false
          aliyun_image=""
          if [[ ${#missing[@]} -eq 0 ]]; then
            aliyun_enabled=true
            aliyun_image="${aliyun_registry}/${aliyun_namespace}/${aliyun_image_name}"
            echo "::notice::Aliyun registry publish enabled for ${aliyun_image}"
          else
            echo "::notice::Aliyun registry publish skipped because these settings are missing: $(IFS=', '; echo "${missing[*]}")."
          fi

          {
            echo "aliyun_enabled=${aliyun_enabled}"
            echo "aliyun_registry=${aliyun_registry}"
            echo "aliyun_namespace=${aliyun_namespace}"
            echo "aliyun_image_name=${aliyun_image_name}"
            echo "aliyun_image=${aliyun_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun Container Registry
        if: github.event_name != 'pull_request' && steps.registry-config.outputs.aliyun_enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry-config.outputs.aliyun_registry }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Prepare publish tags
        id: publish-tags
        shell: bash
        env:
          GHCR_IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          ALIYUN_ENABLED: ${{ steps.registry-config.outputs.aliyun_enabled }}
          ALIYUN_IMAGE: ${{ steps.registry-config.outputs.aliyun_image }}
        run: |
          tags='${{ steps.meta.outputs.tags }}'
          combined_tags="$tags"

          if [[ "$ALIYUN_ENABLED" == "true" && -n "$ALIYUN_IMAGE" ]]; then
            while IFS= read -r tag; do
              [[ -z "$tag" ]] && continue
              suffix="${tag#${GHCR_IMAGE}:}"
              combined_tags+=$'\n'"${ALIYUN_IMAGE}:${suffix}"
            done <<< "$tags"
          fi

          {
            echo 'value<<EOF'
            echo "$combined_tags"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.publish-tags.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODELSCOPE_VERSION=${{ env.MODELSCOPE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
