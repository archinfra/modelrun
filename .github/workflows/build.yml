name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelrun-frontend
          path: dist
          if-no-files-found: error

  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: |
            backend/go.mod
            backend/go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build Linux binary
        run: go build -trimpath -ldflags="-s -w" -o bin/modelrun ./cmd/modelrun

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelrun-backend-linux-amd64
          path: backend/bin/modelrun
          if-no-files-found: error
